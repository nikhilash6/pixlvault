[project]
name = "pixelurgy-vault"
version = "0.2.0"
description = "Pixelurgy Vault Picture Database"
authors = [
    { name = "Pixelurgy" }
]
requires-python = ">=3.10"
dependencies = [
    "fastapi",
    "uvicorn",
    "platformdirs",
    "pillow",
    "numpy",
    "scipy",
    "opencv-python",
    "colorlog",
    "tomli",
    "httpx",
    "python-multipart",
    "onnxruntime",
    "requests",
    "transformers",
    "torch",
    "torchvision",
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-cov"
]
dev = [
    "ruff"
]

[project.scripts]
install-pixelurgy-service = "pixelurgy_vault.scripts.install_systemd_service:main"
pixelurgy-server = "pixelurgy_vault.server:main"
pixelurgy-cli = "pixelurgy_vault.cli:main"

[build-system]
requires = ["setuptools>=42", "wheel", "twine"]
build-backend = "setuptools.build_meta"
