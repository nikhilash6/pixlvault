[project]
name = "pixlvault"
version = "0.4.0"
description = "PixlVault Picture Database"
authors = [
    { name = "PixlVault" }
]
requires-python = ">=3.10"
dependencies = [
    "open_clip_torch",
    "fastapi",
    "uvicorn",
    "setuptools",
    "wheel",
    "twine",
    "numpy",
    "pillow",
    "opencv-python",
    "scipy",
    "platformdirs",
    "tomli",
    "colorlog",
    "httpx",
    "python-multipart",
    "onnxruntime",
    "requests",
    "transformers",
    "torch",
    "torchvision",
    "insightface",
    "rapidfuzz",
    "tqdm",
    "einops",
    "sentence_transformers",
    "spacy"
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-cov"
]
dev = [
    "ruff"
]

[project.scripts]
install-pixlvault-service = "pixlvault.scripts.install_systemd_service:main"
pixlvault-server = "pixlvault.server:main"
pixlvault-cli = "pixlvault.cli:main"

[build-system]
requires = ["setuptools>=42", "wheel", "twine"]
build-backend = "setuptools.build_meta"
