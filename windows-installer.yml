name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        shell: pwsh
        run: |
          Set-Location frontend
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        shell: pwsh
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          $version = python -c "import tomllib, pathlib; d=tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8')); print(d['project']['version'])"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Validate tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $expected = "v${{ steps.version.outputs.version }}"
          if ($tag -ne $expected) {
            Write-Error "Tag $tag does not match pyproject version $expected"
          }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        env:
          PIXLVAULT_VERSION: ${{ steps.version.outputs.version }}
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\windows\PixlVault.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixlvault-windows-installer-${{ steps.version.outputs.version }}
          path: installer-output/*.exe

      - name: Attach installer to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer-output/*.exe
